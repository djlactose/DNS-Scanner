services:
  init:
    image: alpine:3.19
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /secrets/.env ]; then echo "[init] Secrets exist."; exit 0; fi
        echo "[init] Generating secrets..."
        gen() { head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n' | head -c 64; }
        DB_PASSWORD=$${DB_PASSWORD:-$$(gen)}
        SESSION_SECRET=$${SESSION_SECRET:-$$(gen)}; ENCRYPTION_KEY=$${ENCRYPTION_KEY:-$$(gen)}
        printf 'DB_PASSWORD=%s\nSESSION_SECRET=%s\nENCRYPTION_KEY=%s\n' "$$DB_PASSWORD" "$$SESSION_SECRET" "$$ENCRYPTION_KEY" > /secrets/.env
        chmod 644 /secrets/.env
        echo "[init] Secrets ready."
    volumes:
      - secrets:/secrets
    restart: "no"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        . /secrets/.env
        export POSTGRES_PASSWORD="$$DB_PASSWORD"
        exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dnsscanner}
      POSTGRES_USER: ${DB_USER:-dnsscanner}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dnsscanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: djlactose/dnsscaner:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dnsscanner}
      DB_USER: ${DB_USER:-dnsscanner}
      PORT: "8080"
      NODE_ENV: production
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
      MAX_DOMAINS: ${MAX_DOMAINS:-50}
    volumes:
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/srv/dnsscanner}/pgdata
  secrets:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/srv/dnsscanner}/secrets

networks:
  internal:
    driver: bridge
