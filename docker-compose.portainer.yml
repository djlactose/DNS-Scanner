services:
  db:
    image: postgres:16-alpine
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[db] Writing trust pg_hba.conf to /tmp"
        printf 'local all all trust\nhost all all 0.0.0.0/0 trust\nhost all all ::/0 trust\n' > /tmp/pg_hba_override.conf
        exec docker-entrypoint.sh postgres -c hba_file=/tmp/pg_hba_override.conf
    environment:
      POSTGRES_DB: dnsscanner
      POSTGRES_USER: dnsscanner
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnsscanner -d dnsscanner"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  app:
    image: djlactose/dnsscaner:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: dnsscanner
      DB_USER: dnsscanner
      DB_PASSWORD: trust
      PORT: "8080"
      NODE_ENV: production
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
      MAX_DOMAINS: ${MAX_DOMAINS:-50}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        SECRETS_FILE=/home/node/secrets.env
        if [ ! -f "$$SECRETS_FILE" ]; then
          echo "[app] Generating secrets..."
          mkdir -p /home/node
          S1=$$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')
          S2=$$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')
          printf 'SESSION_SECRET=%s\nENCRYPTION_KEY=%s\n' "$$S1" "$$S2" > "$$SECRETS_FILE"
          echo "[app] Secrets generated."
        else
          echo "[app] Loading existing secrets."
        fi
        . "$$SECRETS_FILE"
        export SESSION_SECRET ENCRYPTION_KEY
        echo "[app] Starting application..."
        exec node server.js
    volumes:
      - appdata:/home/node
    depends_on:
      - db
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  pgdata:
  appdata:

networks:
  internal:
    driver: overlay
