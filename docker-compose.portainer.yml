services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-dnsscanner}
      POSTGRES_USER: ${DB_USER:-dnsscanner}
      DB_PASSWORD: ${DB_PASSWORD:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$DB_PASSWORD" ]; then
          if [ ! -f /secrets/.env ]; then
            echo "[init] No secrets provided, generating..."
            gen() { head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n'; }
            printf 'DB_PASSWORD=%s\nSESSION_SECRET=%s\nENCRYPTION_KEY=%s\n' "$$(gen)" "$$(gen)" "$$(gen)" > /secrets/.env
            chmod 600 /secrets/.env
            echo "[init] Secrets saved to /secrets/.env"
          fi
          . /secrets/.env
          export DB_PASSWORD
        fi
        export POSTGRES_PASSWORD="$$DB_PASSWORD"
        exec docker-entrypoint.sh postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/secrets
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dnsscanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  app:
    image: djlactose/dnsscaner:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dnsscanner}
      DB_USER: ${DB_USER:-dnsscanner}
      DB_PASSWORD: ${DB_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PORT: "8080"
      NODE_ENV: production
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
      MAX_DOMAINS: ${MAX_DOMAINS:-50}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$DB_PASSWORD" ] || [ -z "$$SESSION_SECRET" ] || [ -z "$$ENCRYPTION_KEY" ]; then
          echo "[app] Waiting for secrets..."
          while [ ! -f /secrets/.env ]; do sleep 1; done
          . /secrets/.env
          export DB_PASSWORD SESSION_SECRET ENCRYPTION_KEY
        fi
        exec node server.js
    volumes:
      - secrets:/secrets:ro
    depends_on:
      - db
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  pgdata:
  secrets:

networks:
  internal:
    driver: overlay
