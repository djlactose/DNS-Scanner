services:
  init:
    image: alpine:3.19
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - secrets:/secrets
      - ./docker/init-secrets.sh:/init-secrets.sh:ro
    entrypoint: ["/bin/sh", "/init-secrets.sh"]
    restart: "no"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dnsscanner}
      POSTGRES_USER: ${DB_USER:-dnsscanner}
      POSTGRES_PASSWORD_FILE: /secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dnsscanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: '1.0'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - exec redis-server --requirepass "$$(cat /secrets/redis_password)" --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /secrets/redis_password)\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    cpus: '0.5'

  app:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dnsscanner}
      DB_USER: ${DB_USER:-dnsscanner}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8080
      NODE_ENV: production
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
      MAX_DOMAINS: ${MAX_DOMAINS:-50}
    volumes:
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: '1.0'

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "worker.js"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dnsscanner}
      DB_USER: ${DB_USER:-dnsscanner}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
    volumes:
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: '1.0'

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8082}:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    mem_limit: 128m
    cpus: '0.5'

volumes:
  pgdata:
  secrets:

networks:
  internal:
    driver: bridge
