services:
  init:
    image: alpine:3.19
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - secrets:/secrets
      - ./docker/init-secrets.sh:/init-secrets.sh:ro
    entrypoint: ["/bin/sh", "/init-secrets.sh"]
    restart: "no"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dnsscanner}
      POSTGRES_USER: ${DB_USER:-dnsscanner}
      POSTGRES_PASSWORD_FILE: /secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dnsscanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: '1.0'

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dnsscanner}
      DB_USER: ${DB_USER:-dnsscanner}
      PORT: 8080
      NODE_ENV: production
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ALLOW_PRIVATE_RANGES: ${ALLOW_PRIVATE_RANGES:-false}
      MAX_DOMAINS: ${MAX_DOMAINS:-50}
    volumes:
      - secrets:/secrets:ro
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - internal
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: '1.0'

volumes:
  pgdata:
  secrets:

networks:
  internal:
    driver: bridge
